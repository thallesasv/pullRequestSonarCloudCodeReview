name: "PR Review Static"
description: "SonarCloud-powered pull request reviews that detect issues and provide summaries."
author: "PR Review Static"
branding:
  icon: "check-square"
  color: "black"
  tags: "sonarcloud,code-review,static-analysis,automation,pull-requests,linting,ci,devtools"

runs:
  using: "node20"
  main: "dist/index.js"

inputs:
  style_guide_rules:
    required: false
    description: 'Custom style guide rules that will be enforced during review by generating critical comments'
    default: ''
  github_api_url:
    required: false
    description: 'GitHub API URL for GitHub Enterprise Server (e.g., https://github.example.com/api/v3)'
    default: 'https://api.github.com'
  github_server_url:
    required: false
    description: 'GitHub Server URL for GitHub Enterprise Server (e.g., https://github.example.com)'
    default: 'https://github.com'
  sonarcloud_token:
    required: false
    description: 'SonarCloud token used to query issues from the SonarCloud API'
    default: ''
  sonarcloud_organization:
    required: false
    description: 'SonarCloud organization key'
    default: ''
  sonarcloud_project_key:
    required: false
    description: 'SonarCloud project key'
    default: ''
  sonarcloud_url:
    required: false
    description: 'SonarCloud base URL'
    default: 'https://sonarcloud.io'
